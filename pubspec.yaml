name: caluclator_app
description: "Modern Flutter Calculator Application"

publish_to: 'none' # Prevents accidental publishing to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Calculator expression parser
  math_expressions: ^2.4.0

  # Google Fonts for modern UI
  google_fonts: ^6.2.1

  # Icons
  font_awesome_flutter: ^10.7.0

  # State management (optional but recommended)
  provider: ^6.1.2

  # Animations
  animated_toggle_switch: ^0.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# Launcher icons configuration
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/Logo.png" # Pointing inside your declared assets directory
  # Optional Adaptive Icons for modern Android versions
  # adaptive_icon_background: "#FFFFFF"
  # adaptive_icon_foreground: "assets/images/app_icon_foreground.png"

flutter:
  uses-material-design: true

  # Assets directory declaration
  assets:
    - assets/images/

  # Custom Fonts (Uncomment if you add physical font files to your project)
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700

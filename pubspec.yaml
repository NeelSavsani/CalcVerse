name: calculator_app
description: "Modern Flutter Calculator Application"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Calculator expression parser
  math_expressions: ^2.4.0

  # Google Fonts for modern UI
  google_fonts: ^6.2.1

  # Icons
  font_awesome_flutter: ^10.7.0

  # State management (optional but recommended)
  provider: ^6.1.2

  # Animations
  animated_toggle_switch: ^0.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  # Assets
  assets:
    - assets/images/

  # Custom Fonts (Optional)
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700